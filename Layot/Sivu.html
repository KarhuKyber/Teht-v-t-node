<!doctype html>
<html lang="fi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Opiskelijaravintolat</title>
    <link rel="stylesheet" href="Layot.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="navbar">
      <div class="container">
        <div class="logo">Opiskelija<span>ravintolat</span></div>
        <nav>
          <ul>
            <li><a href="#">Ravintolat</a></li>
            <li><a href="#">Tietoa meistä</a></li>
            <li><a href="#" class="btn-login">Kirjaudu</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <section class="hero">
      <div class="hero-content">
        <h1>Opiskelijaravintolat</h1>
        <p>Katso Opiskelijaravintolat</p>
      </div>
    </section>

    <main class="container content">
      <section class="city-section">
        <h2 class="city-title">Helsinki</h2>
        <div class="restaurant-list">
          <div class="res-item">
            <div class="res-info">
              <h3>Metropolia Myllypuro</h3>
              <p>Helsinki</p>
            </div>
            <div class="res-distance">3 km</div>
          </div>
          <div class="res-item">
            <div class="res-info">
              <h3>Mäkkäri</h3>
              <p>F Helsinki</p>
            </div>
            <div class="res-distance">1 km</div>
          </div>
        </div>
      </section>

      <section class="city-section">
        <h2 class="city-title">Espoo</h2>
        <div class="restaurant-list">
          <div class="res-item">
            <div class="res-info">
              <h3>Ravintola mäkkäri</h3>
              <p>Espoo</p>
            </div>
            <div class="res-distance">1 km</div>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <p>&copy; Joku copyright jutska</p>
    </footer>
  </body>
</html>
